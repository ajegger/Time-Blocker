<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Blocker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-info: #e6f1fb;
    --text: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --text-info: #185fa5;
    --border: rgba(0,0,0,0.12);
    --border-med: rgba(0,0,0,0.22);
    --radius: 8px;
    --radius-lg: 12px;
    --block-bg: #c0dd97;
    --block-text: #27500a;
    --gcal-bg: #b5d4f4;
    --gcal-text: #0c447c;
    --accent: #185fa5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #2c2c2a;
      --bg-info: rgba(12,68,124,0.15);
      --text: #f0ede8;
      --text-secondary: #b4b2a9;
      --text-tertiary: #888780;
      --text-info: #85b7eb;
      --border: rgba(255,255,255,0.1);
      --border-med: rgba(255,255,255,0.2);
      --block-bg: #27500a;
      --block-text: #c0dd97;
      --gcal-bg: #0c447c;
      --gcal-text: #b5d4f4;
      --accent: #85b7eb;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  #app { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 20px; letter-spacing: -0.3px; }
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .nav-btn { background: none; border: 0.5px solid var(--border-med); border-radius: var(--radius); padding: 6px 14px; cursor: pointer; font-size: 13px; color: var(--text); transition: background 0.1s; }
  .nav-btn:hover { background: var(--bg-secondary); }
  .week-label { font-size: 15px; font-weight: 500; min-width: 180px; }
  .load-btn { margin-left: auto; background: none; border: 0.5px solid var(--border-med); border-radius: var(--radius); padding: 6px 14px; cursor: pointer; font-size: 13px; color: var(--accent); transition: background 0.1s; }
  .load-btn:hover { background: var(--bg-info); }
  .load-btn:disabled { opacity: 0.5; cursor: default; }
  .status { font-size: 12px; color: var(--text-secondary); }
  .grid-wrap { overflow-x: auto; }
  .grid { display: grid; grid-template-columns: 52px repeat(7, minmax(0,1fr)); border-top: 0.5px solid var(--border); border-left: 0.5px solid var(--border); }
  .col-header { border-right: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); padding: 8px 4px; text-align: center; font-size: 11px; color: var(--text-secondary); background: var(--bg); position: sticky; top: 0; z-index: 10; }
  .col-header .dow { font-weight: 500; font-size: 12px; }
  .col-header .dom { font-size: 20px; font-weight: 400; line-height: 1.3; color: var(--text); }
  .col-header.today .dow { color: var(--accent); }
  .col-header.today .dom { background: var(--accent); color: #fff; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; margin: 2px auto 0; font-size: 15px; font-weight: 500; }
  .time-label { border-right: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); padding: 0 6px; font-size: 10px; color: var(--text-tertiary); height: 40px; display: flex; align-items: flex-start; justify-content: flex-end; padding-top: 3px; }
  .day-col { position: relative; }
  .cell { border-right: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); height: 40px; cursor: crosshair; transition: background 0.08s; }
  .cell:hover { background: var(--bg-secondary); }
  .event-block { position: absolute; left: 2px; right: 2px; border-radius: 4px; padding: 2px 5px; font-size: 11px; overflow: hidden; z-index: 5; line-height: 1.4; pointer-events: all; }
  .event-block.gcal { background: var(--gcal-bg); color: var(--gcal-text); }
  .event-block.block { background: var(--block-bg); color: var(--block-text); display: flex; justify-content: space-between; align-items: flex-start; }
  .block-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .del-btn { cursor: pointer; opacity: 0.5; font-size: 11px; line-height: 1; flex-shrink: 0; margin-left: 4px; padding: 0 2px; }
  .del-btn:hover { opacity: 1; }
  .drag-preview { position: absolute; left: 2px; right: 2px; border-radius: 4px; background: rgba(99,153,34,0.25); border: 1.5px dashed #639922; z-index: 20; pointer-events: none; }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 200; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--bg); border: 0.5px solid var(--border-med); border-radius: var(--radius-lg); padding: 20px; width: 260px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
  .modal h3 { font-size: 14px; font-weight: 500; margin-bottom: 14px; }
  .modal input { width: 100%; padding: 7px 10px; font-size: 13px; border: 0.5px solid var(--border-med); border-radius: var(--radius); background: var(--bg); color: var(--text); margin-bottom: 12px; }
  .modal input:focus { outline: none; border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; }
  .modal-actions button { flex: 1; padding: 7px; font-size: 13px; border-radius: var(--radius); cursor: pointer; border: 0.5px solid var(--border-med); transition: background 0.1s; }
  .btn-save { background: var(--bg-info); color: var(--accent); border-color: transparent !important; font-weight: 500; }
  .btn-save:hover { opacity: 0.85; }
  .btn-cancel { background: none; color: var(--text-secondary); }
  .btn-cancel:hover { background: var(--bg-secondary); }
  .legend { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
</style>
</head>
<body>
<div id="app">
  <h1>Time Blocker</h1>
  <div class="toolbar">
    <button class="nav-btn" id="prev">&#8249;</button>
    <span class="week-label" id="week-label"></span>
    <button class="nav-btn" id="next">&#8250;</button>
    <button class="nav-btn" id="today-btn">Today</button>
    <button class="load-btn" id="load-gcal">Load Google Calendar</button>
    <span class="status" id="status"></span>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--block-bg);"></div> Time block (drag to create)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--gcal-bg);"></div> Google Calendar event</div>
  </div>
  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>
</div>

<div id="modal" style="display:none;" class="modal-backdrop">
  <div class="modal">
    <h3>Add time block</h3>
    <input type="text" id="block-label" placeholder="Label (e.g. Deep work)" />
    <div class="modal-actions">
      <button class="btn-save" id="save-block">Save</button>
      <button class="btn-cancel" id="cancel-block">Cancel</button>
    </div>
  </div>
</div>

<script>
const HOUR_START = 7, HOUR_END = 21, PX_PER_HALF = 40;
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const SUPABASE_URL = 'https://vmxgykepxymzclqjubnq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Us6PPr7g4p0f9JBOoYBEow_wMWb6fuD';

let weekOffset = 0;
let blocks = [];
let gcalEvents = [];
let dragState = null;
let pendingSlot = null;
let dragPreviewEl = null;

async function loadBlocks() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/blocks?select=*`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    blocks = await res.json();
  } catch(e) { blocks = []; }
  renderGrid();
}

async function saveBlock(block) {
  await fetch(`${SUPABASE_URL}/rest/v1/blocks`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(block)
  });
}

async function deleteBlock(id) {
  await fetch(`${SUPABASE_URL}/rest/v1/blocks?id=eq.${id}`, {
    method: 'DELETE',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
}

function getWeekStart(offset) {
  const now = new Date();
  const d = new Date(now);
  d.setDate(now.getDate() - now.getDay() + 1 + offset * 7);
  d.setHours(0,0,0,0);
  return d;
}

function dateKey(d) { return d.toISOString().slice(0,10); }

function slotToTime(slot) {
  const h = HOUR_START + Math.floor(slot / 2);
  const m = slot % 2 === 0 ? '00' : '30';
  const display = h > 12 ? h - 12 : h;
  const ampm = h >= 12 ? 'pm' : 'am';
  return `${display}:${m}${ampm}`;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const weekStart = getWeekStart(weekOffset);
  const days = Array.from({length:7}, (_,i) => { const d = new Date(weekStart); d.setDate(weekStart.getDate()+i); return d; });
  const today = new Date(); today.setHours(0,0,0,0);

  document.getElementById('week-label').textContent =
    `${MONTHS[days[0].getMonth()]} ${days[0].getDate()} – ${days[6].getDate()}, ${days[0].getFullYear()}`;

  const corner = document.createElement('div');
  corner.className = 'col-header';
  grid.appendChild(corner);

  days.forEach(d => {
    const h = document.createElement('div');
    h.className = 'col-header' + (d.getTime()===today.getTime() ? ' today' : '');
    h.innerHTML = `<div class="dow">${DAYS[d.getDay()]}</div><div class="dom">${d.getDate()}</div>`;
    grid.appendChild(h);
  });

  const slots = (HOUR_END - HOUR_START) * 2;
  const dayCols = days.map((d, di) => {
    const col = document.createElement('div');
    col.className = 'day-col';
    col.id = `daycol-${di}`;
    col.style.cssText = `grid-column:${di+2};grid-row:2/${slots+2};position:relative;`;
    return col;
  });

  for (let s = 0; s < slots; s++) {
    const hour = HOUR_START + Math.floor(s/2);
    const tl = document.createElement('div');
    tl.className = 'time-label';
    tl.style.cssText = `grid-column:1;grid-row:${s+2};`;
    if (s%2===0) {
      const h = hour > 12 ? hour-12 : hour;
      tl.textContent = `${h}${hour>=12?'p':'a'}`;
    }
    grid.appendChild(tl);

    days.forEach((d, di) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.di = di;
      cell.dataset.slot = s;
      cell.style.cssText = `grid-column:${di+2};grid-row:${s+2};`;
      cell.addEventListener('mousedown', onMouseDown);
      cell.addEventListener('mouseenter', onMouseEnter);
      grid.appendChild(cell);
    });
  }

  dayCols.forEach(col => grid.appendChild(col));

  days.forEach((d, di) => {
    const key = dateKey(d);
    const col = document.getElementById(`daycol-${di}`);

    gcalEvents.filter(e => e.dateKey===key).forEach(ev => {
      const el = document.createElement('div');
      el.className = 'event-block gcal';
      el.style.cssText = `top:${ev.startSlot*PX_PER_HALF}px;height:${Math.max(ev.duration*PX_PER_HALF,20)}px;`;
      el.textContent = ev.label;
      el.title = `${ev.label} (${slotToTime(ev.startSlot)}–${slotToTime(ev.startSlot+ev.duration)})`;
      col.appendChild(el);
    });

    blocks.filter(b => b.date_key===key).forEach(bl => {
      const el = document.createElement('div');
      el.className = 'event-block block';
      el.style.cssText = `top:${bl.start_slot*PX_PER_HALF}px;height:${Math.max(bl.duration*PX_PER_HALF,20)}px;`;
      el.title = `${bl.label} (${slotToTime(bl.start_slot)}–${slotToTime(bl.start_slot+bl.duration)})`;
      el.innerHTML = `<span class="block-label">${bl.label}</span><span class="del-btn" data-id="${bl.id}">✕</span>`;
      el.querySelector('.del-btn').addEventListener('click', async e => {
        e.stopPropagation();
        await deleteBlock(bl.id);
        blocks = blocks.filter(b => b.id !== bl.id);
        renderGrid();
      });
      col.appendChild(el);
    });
  });
}

function onMouseDown(e) {
  const di = parseInt(e.currentTarget.dataset.di);
  const slot = parseInt(e.currentTarget.dataset.slot);
  dragState = { di, startSlot: slot, endSlot: slot };
  updatePreview();
  e.preventDefault();
}

function onMouseEnter(e) {
  if (!dragState) return;
  if (parseInt(e.currentTarget.dataset.di) !== dragState.di) return;
  dragState.endSlot = parseInt(e.currentTarget.dataset.slot);
  updatePreview();
}

function updatePreview() {
  clearPreview();
  if (!dragState) return;
  const col = document.getElementById(`daycol-${dragState.di}`);
  if (!col) return;
  const s1 = Math.min(dragState.startSlot, dragState.endSlot);
  const s2 = Math.max(dragState.startSlot, dragState.endSlot);
  dragPreviewEl = document.createElement('div');
  dragPreviewEl.className = 'drag-preview';
  dragPreviewEl.style.cssText = `top:${s1*PX_PER_HALF}px;height:${(s2-s1+1)*PX_PER_HALF}px;`;
  col.appendChild(dragPreviewEl);
}

function clearPreview() {
  if (dragPreviewEl) { dragPreviewEl.remove(); dragPreviewEl = null; }
}

document.addEventListener('mouseup', () => {
  if (!dragState) return;
  const { di, startSlot, endSlot } = dragState;
  dragState = null;
  clearPreview();
  const s1 = Math.min(startSlot, endSlot);
  const s2 = Math.max(startSlot, endSlot);
  const weekStart = getWeekStart(weekOffset);
  const d = new Date(weekStart);
  d.setDate(weekStart.getDate() + di);
  pendingSlot = { date_key: dateKey(d), start_slot: s1, duration: s2-s1+1 };
  document.getElementById('block-label').value = '';
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('block-label').focus(), 50);
});

document.getElementById('save-block').addEventListener('click', async () => {
  if (!pendingSlot) return;
  const label = document.getElementById('block-label').value.trim() || 'Block';
  const block = { id: Date.now()+'', ...pendingSlot, label };
  document.getElementById('modal').style.display = 'none';
  pendingSlot = null;
  await saveBlock(block);
  blocks.push(block);
  renderGrid();
});

document.getElementById('cancel-block').addEventListener('click', () => {
  document.getElementById('modal').style.display = 'none';
  pendingSlot = null;
});

document.getElementById('block-label').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('save-block').click();
  if (e.key === 'Escape') document.getElementById('cancel-block').click();
});

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) document.getElementById('cancel-block').click();
});

document.getElementById('prev').addEventListener('click', () => { weekOffset--; renderGrid(); });
document.getElementById('next').addEventListener('click', () => { weekOffset++; renderGrid(); });
document.getElementById('today-btn').addEventListener('click', () => { weekOffset=0; renderGrid(); });

document.getElementById('load-gcal').addEventListener('click', async () => {
  const btn = document.getElementById('load-gcal');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'Loading...';
  status.textContent = '';

  const weekStart = getWeekStart(weekOffset);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 7);

  const prompt = `Use Google Calendar to list all events for the week of ${weekStart.toISOString().slice(0,10)} to ${weekEnd.toISOString().slice(0,10)}. Return ONLY a JSON array (no markdown, no preamble) where each item has: dateKey (YYYY-MM-DD string), startSlot (integer: (hour-${HOUR_START})*2 + (minute>=30?1:0)), duration (integer half-hour slots, minimum 1), label (string event title). Omit all-day events and events outside ${HOUR_START}:00–${HOUR_END}:00.`;

  try {
    const res = await fetch('/api/calendar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, weekStart: weekStart.toISOString(), weekEnd: weekEnd.toISOString() })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || data.error);
    const text = data.content.filter(c=>c.type==='text').map(c=>c.text).join('');
    const clean = text.replace(/```json|```/g,'').trim();
    gcalEvents = JSON.parse(clean);
    status.textContent = `${gcalEvents.length} event${gcalEvents.length!==1?'s':''} loaded`;
    renderGrid();
  } catch(err) {
    status.textContent = 'Could not load calendar.';
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Load Google Calendar';
  }
});

loadBlocks();
</script>
</body>
</html>
